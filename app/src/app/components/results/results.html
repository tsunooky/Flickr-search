@if (photos.length > 0) {
  <div class="row row-cols-2 row-cols-md-4 g-2">
    @for (p of photos; track p.id) {
      <div class="col">
        <div
          class="card h-100 border-0 shadow-sm"
          style="cursor: pointer"
          (click)="photoClick.emit(p)"
        >
          <img
            [src]="p[size] || p.url_m"
            class="card-img-top object-fit-cover w-100"
            style="aspect-ratio: 4/3"
            [alt]="p.title"
            loading="lazy"
          />
          <div class="card-body p-2 text-muted" style="font-size: 0.8rem">
            <div class="text-truncate fw-bold text-dark mb-1">{{ p.title || 'Sans titre' }}</div>
            <div class="d-flex justify-content-between">
              <span class="text-truncate me-1">Par {{ p.ownername }}</span>
              <span>{{ p.dateupload * 1000 | date: 'dd/MM/yyyy' }}</span>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
}
